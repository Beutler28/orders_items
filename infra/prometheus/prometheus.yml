global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  # O Prometheus "raspa" o endpoint de métricas que o Actuator expõe em cada serviço.
  # host.docker.internal = a máquina host, onde os serviços rodam fora do Docker.
  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]

  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083"]
